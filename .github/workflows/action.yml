name: rssblog source
on:
  workflow_dispatch:
  schedule:
    - cron: '0 16,4,10 * * *'
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull source
        if: ${{ github.ref == 'refs/heads/master' }}
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1
          ref: master

      - name: Pull source dev
        if: ${{ github.ref == 'refs/heads/dev' }}
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1
          ref: dev

      - name: Prepare public directory
        run: mkdir -p ./public

      - name: Pull public
        uses: actions/checkout@v4
        if: ${{ github.ref == 'refs/heads/master' }}
        with:
          persist-credentials: false
          fetch-depth: 1
          ref: public
          path: ./public
        continue-on-error: true

      - name: Pull public dev
        uses: actions/checkout@v4
        if: ${{ github.ref == 'refs/heads/dev' }}
        with:
          persist-credentials: false
          fetch-depth: 1
          ref: public-dev
          path: ./public
        continue-on-error: true

      - name: Check source
        shell: bash
        run: |
          rm -fr ./public/.git
          ls -lh ./

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build source
        run: python action.py

      - name: Fix source
        run: python fixed.py ${{ secrets.FIXED_TYPE }}

      - name: Upload public
        uses: actions/upload-artifact@v4
        with:
          name: public
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Determine target branch
        id: branch
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "name=public" >> $GITHUB_OUTPUT
          else
            echo "name=public-dev" >> $GITHUB_OUTPUT
          fi

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.name }}
          fetch-depth: 1
        continue-on-error: true

      - name: Create orphan branch if not exists
        if: failure()
        run: |
          git checkout --orphan ${{ steps.branch.outputs.name }}
          git rm -rf . 2>/dev/null || true

      - name: Clean working directory
        run: |
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} + 2>/dev/null || true

      - name: Download public artifact
        uses: actions/download-artifact@v4
        with:
          name: public
          path: ./

      - name: Check downloaded files
        run: ls -lh ./

      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "daily update $(date +'%B %d, %Y %T (%Z)')" --allow-empty
          git push origin ${{ steps.branch.outputs.name }} --force
